<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sala de Cinema</title>
    <style>
        body { font-family: Arial, sans-serif; text-align: center; margin: 0; padding: 20px; background: #1a1a1a; color: white; }
        .tela { display: none; max-width: 400px; margin: 20px auto; padding: 20px; background: #333; border-radius: 10px; }
        .ativa { display: block; }
        input, button { display: block; width: 90%; margin: 10px auto; padding: 12px; border-radius: 5px; border: none; font-size: 16px; }
        button { background: #e50914; color: white; cursor: pointer; font-weight: bold; }
        button:hover { background: #f40612; }
        video { width: 100%; max-width: 800px; background: black; border-radius: 10px; margin-top: 20px; }
        .status-msg { font-size: 14px; color: #ffc107; margin-top: 10px; font-weight: bold; }
        
        /* Painel de Diagnóstico Visível */
        #painel-debug { max-width: 500px; margin: 30px auto; padding: 15px; background: #000; border: 1px solid #444; border-radius: 5px; text-align: left; font-family: monospace; font-size: 12px; color: #00ff00; overflow-y: auto; max-height: 180px; }
    </style>
</head>
<body>

    <h1>🍿 CineTeca P2P</h1>

    <div id="menu" class="tela ativa">
        <button onclick="mostrarTela('criar')">Criar Sala (PC)</button>
        <button onclick="mostrarTela('entrar')">Entrar numa Sala (Mobile/PC)</button>
    </div>

    <div id="criar" class="tela">
        <h3>Criar Sala</h3>
        <input type="text" id="criar-nome" placeholder="Nome da sala (ex: filmes)">
        <input type="password" id="criar-senha" placeholder="Senha da sala (ex: 123)">
        <button onclick="criarSala()">Iniciar Transmissão</button>
        <button onclick="mostrarTela('menu')" style="background: #555;">Voltar</button>
        <p id="status-host" class="status-msg"></p>
    </div>

    <div id="entrar" class="tela">
        <h3>Entrar na Sala</h3>
        <input type="text" id="entrar-nome" placeholder="Nome da sala">
        <input type="password" id="entrar-senha" placeholder="Senha da sala">
        <button onclick="entrarSala()">Conectar</button>
        <button onclick="mostrarTela('menu')" style="background: #555;">Voltar</button>
        <p id="status-viewer" class="status-msg"></p>
    </div>

    <div id="cinema" class="tela" style="max-width: 800px;">
        <h3 id="titulo-cinema">Carregando...</h3>
        <video id="videoPlayer" autoplay playsinline controls muted style="width:100%;"></video>
        <p style="font-size: 12px; color: #aaa; margin-top: 10px;">Se estiver sem som, clique no player e ative o volume.</p>
        <button onclick="location.reload()" style="background: #555; width: auto; display: inline-block;">Sair da Sala</button>
    </div>

    <div id="painel-debug">
        <strong>Status do Sistema:</strong>
        <div id="log-conteudo">Aguardando ação...</div>
    </div>

    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>

    <script>
        let peer;
        let streamDeVideo;

        // Servidores de conexão global públicos e estáveis
        const configWebRTC = {
            config: {
                'iceServers': [
                    { 'urls': 'stun:stun.l.google.com:19302' },
                    { 'urls': 'stun:stun1.l.google.com:19302' },
                    {
                        'urls': 'turn:openrelay.metered.ca:80',
                        'username': 'openrelayproject',
                        'credential': 'openrelayproject'
                    },
                    {
                        'urls': 'turn:openrelay.metered.ca:443',
                        'username': 'openrelayproject',
                        'credential': 'openrelayproject'
                    }
                ]
            }
        };

        function depurar(texto) {
            const log = document.getElementById('log-conteudo');
            log.innerHTML += "<br>➔ " + texto;
            console.log(texto);
        }

        function mostrarTela(id) {
            document.querySelectorAll('.tela').forEach(t => t.classList.remove('ativa'));
            document.getElementById(id).classList.add('ativa');
        }

        function gerarIdDaSala(nome, senha) {
            return "cine-" + nome.toLowerCase().replace(/[^a-z0-9]/g, "") + "-" + senha.toLowerCase().replace(/[^a-z0-9]/g, "");
        }

        async function criarSala() {
            const nome = document.getElementById('criar-nome').value;
            const senha = document.getElementById('criar-senha').value;
            const status = document.getElementById('status-host');
            
            if(!nome || !senha) return alert("Preencha o nome e a senha!");

            const salaId = gerarIdDaSala(nome, senha);
            status.innerText = "Pedindo permissão de tela...";

            try {
                streamDeVideo = await navigator.mediaDevices.getDisplayMedia({ video: true, audio: true });
                depurar("Ecrã capturado com sucesso no PC.");
                status.innerText = "Conectando ao servidor...";
                
                peer = new Peer(salaId, configWebRTC);

                peer.on('open', (id) => {
                    depurar("PC Online! Sala registada com ID: " + id);
                    status.innerText = "";
                    mostrarTela('cinema');
                    document.getElementById('titulo-cinema').innerText = "Transmissão da Sala: " + nome;
                    document.getElementById('videoPlayer').srcObject = streamDeVideo;
                });

                // Nova Lógica: O PC aguarda o amigo conectar via dados
                peer.on('connection', (conn) => {
                    depurar("Um amigo entrou na sala! Enviando sinal de vídeo para ele...");
                    
                    // O PC faz a chamada de vídeo diretamente para o ID do amigo
                    setTimeout(() => {
                        peer.call(conn.peer, streamDeVideo);
                        depurar("Transmissão enviada para o ID: " + conn.peer);
                    }, 800);
                });

                peer.on('error', (err) => {
                    depurar("ERRO NO PC: " + err.type);
                });

                streamDeVideo.getVideoTracks()[0].onended = () => location.reload();

            } catch (err) {
                depurar("Erro ao iniciar espelhamento: " + err.message);
            }
        }

        function entrarSala() {
            const nome = document.getElementById('entrar-nome').value;
            const senha = document.getElementById('entrar-senha').value;
            const status = document.getElementById('status-viewer');
            
            if(!nome || !senha) return alert("Preencha o nome e a senha!");

            const salaId = gerarIdDaSala(nome, senha);
            status.innerText = "Conectando...";

            peer = new Peer(configWebRTC);

            peer.on('open', (id) => {
                depurar("Telemóvel Online. O meu ID único é: " + id);
                depurar("A abrir túnel de dados para a sala...");
                
                // Conecta via canal de dados (estável e sem bloqueios)
                const conn = peer.connect(salaId);
                
                conn.on('open', () => {
                    status.innerText = "Conectado! A aguardar que o PC envie o vídeo...";
                    depurar("Túnel de dados aberto. Aguardando chamada do PC...");
                });
            });

            // O telemóvel fica à espera de receber a chamada vinda do PC
            peer.on('call', (chamada) => {
                depurar("PC a ligar para nós! A aceitar transmissão...");
                chamada.answer(); // Aceita o vídeo do PC sem enviar nada de volta

                chamada.on('stream', (streamRemoto) => {
                    depurar("Vídeo recebido com sucesso!");
                    status.innerText = "";
                    mostrarTela('cinema');
                    document.getElementById('titulo-cinema').innerText = "Assistindo Sala: " + nome;
                    
                    const videoElement = document.getElementById('videoPlayer');
                    videoElement.srcObject = streamRemoto;
                });
            });

            peer.on('error', (err) => {
                depurar("ERRO NO CLIENTE: " + err.type);
                if(err.type === 'peer-unavailable') {
                    status.innerText = "Sala não encontrada! Confirma se o PC já ativou a sala.";
                }
            });
        }
    </script>
</body>
</html>
